data_config:
  litters:
    path: data/litters.json
    _enabled_editors:
      - data

  queens:
    path: data/queens.json
    _enabled_editors:
      - data

  kings:
    path: data/kings.json
    _enabled_editors:
      - data

  news:
    path: data/news.json
    _enabled_editors:
      - data

_select_data:
  sire_options:
    values: data.kings[*]
    value_key: name

  dame_options:
    values: data.queens[*]
    value_key: name

_inputs:
  sire:
    label: Sire
    type: select
    options:
      values: _select_data.sire_options
      allow_empty: true

  dame:
    label: Dame
    type: select
    options:
      values: _select_data.dame_options
      allow_empty: true

  birth_date:
    label: Birth Date
    type: date

  status:
    label: Status
    type: select
    options:
      values:
        - Available
        - Upcoming
        - Reserved
        - Sold Out
        - Held Back
        - Adopted

  description:
    label: Description
    type: multiline

  kittens:
    label: Kittens
    type: array
    options:
      structures: litter_kitten

  sex:
    label: Sex
    type: select
    options:
      values:
        - Male
        - Female

  image:
    label: Image
    type: image

  notes:
    label: Notes
    type: multiline

  date:
    label: Date
    type: date

  category:
    label: Category
    type: select
    options:
      values:
        - Pregnancy Update
        - Birth Announcement
        - Birthday
        - General Update

  body:
    label: Body
    type: multiline

  birthday:
    label: Birthday
    type: date

_structures:
  litter_kitten:
    values:
      - label: Kitten
        icon: pets
        value:
          id: ""
          name: ""
          sex: ""
          color: ""
          status: "Available"
          price: ""
          image: ""
          notes: ""