data_config:
  litters:
    path: data/litters.json
    _enabled_editors:
      - data

  queens:
    path: data/queens.json
    _enabled_editors:
      - data

  kings:
    path: data/kings.json
    _enabled_editors:
      - data

  news:
    path: data/news.json
    _enabled_editors:
      - data

_inputs:
  sire:
    label: Sire
    type: select
   options:
  values: data.kings[*].name
  allow_create: false
  allow_empty: false

  dame:
    label: Dame
    type: select
options:
  values: data.queens[*].name
  allow_create: false
  allow_empty: false

  birth_date:
    label: Birth Date
    type: date

  status:
    label: Status
    type: select
    options:
      values:
        - Available
        - Upcoming
        - Reserved
        - Sold Out
        - Held Back
        - Adopted

  description:
    label: Description
    type: multiline

  kittens:
    label: Kittens
    type: array
    options:
      structures: kitten

  name:
    label: Name

  sex:
    label: Sex
    type: select
    options:
      values:
        - Male
        - Female

  color:
    label: Color

  price:
    label: Price

  image:
    label: Image
    type: image

  notes:
    label: Notes
    type: multiline

  birthday:
    label: Birthday
    type: date

  date:
    label: Date
    type: date

  category:
    label: Category
    type: select
    options:
      values:
        - Pregnancy Update
        - Birth Announcement
        - Birthday
        - General Update

  body:
    label: Body
    type: multiline

_structures:
  kitten:
    values:
      - label: Kitten
        icon: pets
        value:
          id: ""
          name: ""
          sex: ""
          color: ""
          status: "Available"
          price: ""
          image: ""
          notes: ""