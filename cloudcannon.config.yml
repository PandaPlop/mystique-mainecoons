-0pppaths:
  uploads: uploads
  static: ''

data_config:
  litters:
    path: Data/litters.json
    _enabled_editors:
      - data

  queens:
    path: Data/queens.json
    _enabled_editors:
      - data

  kings:
    path: Data/kings.json
    _enabled_editors:
      - data

  news:
    path: Data/news.json
    _enabled_editors:
      - data

collections_config:
  pages:
    path: ''
    name: mystique_mainecoons
    icon: wysiwyg
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false

  data:
    path: Data
    icon: data_usage
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false

    _inputs:
      $.litters[*].id:
        label: Litter ID
        cascade: true

      $.litters[*].title:
        label: Title
        cascade: true

      $.litters[*].sire:
        type: select
        label: Sire
        options:
          allow_create: false
          allow_empty: false
          values: data.kings[*].name
        cascade: true

      $.litters[*].dame:
        type: select
        label: Dame
        options:
          allow_create: false
          allow_empty: false
          values: data.queens[*].name
        cascade: true

      $.litters[*].birth_date:
        type: date
        label: Birth Date
        cascade: true

      $.litters[*].description:
        type: textarea
        label: Description
        cascade: true

      $.litters[*].kittens:
        type: array
        label: Kittens
        options:
          structures: kitten
        cascade: true

      $.litters[*].kittens[*].id:
        label: Kitten ID
        cascade: true

      $.litters[*].kittens[*].name:
        label: Name
        cascade: true

      $.litters[*].kittens[*].sex:
        type: select
        label: Sex
        options:
          allow_create: false
          allow_empty: false
          values:
            - Male
            - Female
        cascade: true

      $.litters[*].kittens[*].color:
        label: Color
        cascade: true

      $.litters[*].kittens[*].status:
        type: select
        label: Availability
        options:
          allow_create: false
          allow_empty: false
          values:
            - Available
            - Reserved
            - On Hold
            - Under Review
            - Sold
            - Retained
        cascade: true

      $.litters[*].kittens[*].price:
        label: Price
        cascade: true

      $.litters[*].kittens[*].image:
        type: image
        label: Image
        cascade: true

      $.litters[*].kittens[*].notes:
        type: textarea
        label: Notes
        cascade: true

      $.queens[*].id:
        label: Queen ID
        cascade: true

      $.queens[*].name:
        label: Name
        cascade: true

      $.queens[*].color:
        label: Color
        cascade: true

      $.queens[*].status:
        type: select
        label: Status
        options:
          allow_create: false
          allow_empty: false
          values:
            - Active Queen
            - Retired
            - Future Queen
        cascade: true

      $.queens[*].birthday:
        type: date
        label: Birthday
        cascade: true

      $.queens[*].image:
        type: image
        label: Image
        cascade: true

      $.queens[*].description:
        type: textarea
        label: Description
        cascade: true

      $.kings[*].id:
        label: King ID
        cascade: true

      $.kings[*].name:
        label: Name
        cascade: true

      $.kings[*].color:
        label: Color
        cascade: true

      $.kings[*].status:
        type: select
        label: Status
        options:
          allow_create: false
          allow_empty: false
          values:
            - Active King
            - Retired
            - Future King
        cascade: true

      $.kings[*].birthday:
        type: date
        label: Birthday
        cascade: true

      $.kings[*].image:
        type: image
        label: Image
        cascade: true

      $.kings[*].description:
        type: textarea
        label: Description
        cascade: true

      $.news[*].id:
        label: News ID
        cascade: true

      $.news[*].title:
        label: Title
        cascade: true

      $.news[*].date:
        type: date
        label: Date
        cascade: true

      $.news[*].category:
        type: select
        label: Category
        options:
          allow_create: false
          allow_empty: false
          values:
            - Pregnancy Update
            - Birth Announcement
            - Birthday
            - General Update
        cascade: true

      $.news[*].image:
        type: image
        label: Image
        cascade: true

      $.news[*].body:
        type: textarea
        label: Body
        cascade: true

_structures:
  kitten:
    values:
      - label: Kitten
        icon: pets
        value:
          id: ""
          name: ""
          sex: "Male"
          color: ""
          status: "Available"
          price: ""
          image: ""
          notes: ""

timezone: America/Chicago

markdown:
  engine: commonmark
  options:
    xhtml: false
    breaks: false
    linkify: false
    typographer: false
    spaced_lists: false
    sentence_per_line: false
    gfm: false
    code_block_fences: '```'
    escape_snippets_in_code_blocks: false
    treat_indentation_as_code: false
    table: false
    strikethrough: false
    subscript: false
    superscript: false
    heading_ids: false
    attributes: false