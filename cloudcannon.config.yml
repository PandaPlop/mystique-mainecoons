paths:
  uploads: uploads
  static: ''
collections_config:
  pages:
    path: ''
    name: mystique_mainecoons
    icon: wysiwyg
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  data:
    path: Data
    icon: data_usage
    disable_url: false
    _inputs:
      $.litters[*].sire:
        type: select
        options:
          allow_create: false
          allow_empty: false
          values:
          value_key: data.kings[*].name
          preview:
          picker_preview:
          view:
          picker_view:
          required:
          required_message:
          min_length:
          min_length_message:
          max_length:
          max_length_message:
          pattern:
          pattern_message:
          min_graphemes:
          min_graphemes_message:
          max_graphemes:
          max_graphemes_message:
          min_words:
          min_words_message:
          max_words:
          max_words_message:
          locale:
          empty_type:
        cascade: true
      $.litters[*].dame:
        type: select
        options:
          allow_create:
          allow_empty: true
          values:
          value_key: data.queens[*].name
          preview:
          picker_preview:
          view:
          picker_view:
          required:
          required_message:
          min_length:
          min_length_message:
          max_length:
          max_length_message:
          pattern:
          pattern_message:
          min_graphemes:
          min_graphemes_message:
          max_graphemes:
          max_graphemes_message:
          min_words:
          min_words_message:
          max_words:
          max_words_message:
          locale:
          empty_type:
        cascade: true
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
timezone: America/Chicago
markdown:
  engine: commonmark
  options:
    xhtml: false
    breaks: false
    linkify: false
    typographer: false
    spaced_lists: false
    sentence_per_line: false
    gfm: false
    code_block_fences: '```'
    escape_snippets_in_code_blocks: false
    treat_indentation_as_code: false
    table: false
    strikethrough: false
    subscript: false
    superscript: false
    heading_ids: false
    attributes: false
