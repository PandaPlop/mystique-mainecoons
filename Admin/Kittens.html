<div data-cms-bind="Data/litters.json">

	<div data-cms-repeat="litters">

		<div class="litter-card">

			<input class="input" type="text" data-cms-field="id" placeholder="Litter ID" />

			<input class="input" type="text" data-cms-field="title" placeholder="Title" />

			<input class="input" type="text" data-cms-field="sire" placeholder="Sire" />

			<input class="input" type="text" data-cms-field="dame" placeholder="Dame" />

			<input class="input" type="text" data-cms-field="birth_date" placeholder="Birth Date" />

			<select class="select" data-cms-field="status">
				<option>Available</option>
				<option>Reserved</option>
				<option>On Hold</option>
				<option>Under Review</option>
				<option>Sold</option>
				<option>Retained</option>
			</select>

			<textarea class="textarea" data-cms-field="description"></textarea>

			<!-- KITTENS -->
			<div data-cms-repeat="kittens">

				<div class="kitten-card">

					<input class="input" type="text" data-cms-field="id" placeholder="Kitten ID" />

					<input class="input" type="text" data-cms-field="name" placeholder="Name" />

					<select class="select" data-cms-field="sex">
						<option>Male</option>
						<option>Female</option>
					</select>

					<input class="input" type="text" data-cms-field="color" placeholder="Color" />

					<select class="select" data-cms-field="status">
						<option>Available</option>
						<option>Reserved</option>
						<option>On Hold</option>
						<option>Under Review</option>
						<option>Sold</option>
						<option>Retained</option>
					</select>

					<input class="input" type="number" data-cms-field="price" />

					<input class="input" type="text" data-cms-field="image" />

					<textarea class="textarea" data-cms-field="notes"></textarea>

				</div>

			</div>

		</div>

	</div>

</div>
