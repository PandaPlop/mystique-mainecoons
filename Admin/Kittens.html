<section class="section" data-cms-editor="data.litters">

	<div data-cms-bind="litters">

		<div data-cms-repeat="litters">

			<!-- LITTER -->
			<div class="litter-card">

				<!-- DELETE LITTER -->
				<button data-cms-remove>Delete Litter</button>

				<h2>Litter</h2>

				<input type="text" placeholder="Litter ID" data-cms-field="id" />
				<input type="text" placeholder="Title" data-cms-field="title" />
				<input type="text" placeholder="Sire" data-cms-field="sire" />
				<input type="text" placeholder="Dame" data-cms-field="dame" />

				<input type="text" placeholder="Birth Date" data-cms-field="birth_date" />

				<select data-cms-field="status">
					<option>Available</option>
					<option>Reserved</option>
					<option>On Hold</option>
					<option>Under Review</option>
					<option>Sold</option>
					<option>Retained</option>
				</select>

				<textarea placeholder="Description" data-cms-field="description"></textarea>

				<!-- KITTENS -->
				<div data-cms-bind="kittens">

					<h3>Kittens</h3>

					<div data-cms-repeat="kittens">

						<div class="kitten-card">

							<!-- DELETE KITTEN -->
							<button data-cms-remove>Delete Kitten</button>

							<input type="text" placeholder="Kitten ID" data-cms-field="id" />
							<input type="text" placeholder="Name" data-cms-field="name" />

							<select data-cms-field="sex">
								<option>Male</option>
								<option>Female</option>
							</select>

							<input type="text" placeholder="Color" data-cms-field="color" />

							<select data-cms-field="status">
								<option>Available</option>
								<option>Reserved</option>
								<option>On Hold</option>
								<option>Under Review</option>
								<option>Sold</option>
								<option>Retained</option>
							</select>

							<input type="number" placeholder="Price" data-cms-field="price" />

							<input type="text" placeholder="Image Path" data-cms-field="image" />

							<textarea placeholder="Notes" data-cms-field="notes"></textarea>

						</div>

					</div>

					<!-- ADD KITTEN -->
					<button data-cms-add="kittens">Add Kitten</button>

				</div>

			</div>

		</div>

		<!-- ADD LITTER -->
		<button data-cms-add="litters">Add Litter</button>

	</div>

</section>
