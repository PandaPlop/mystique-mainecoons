<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Base Template</title>

	<style>
	:root {
		--design-width: 1200;
		--phone-width: 375px;
		--desktop-width: 1200px;

		--t: clamp(
		0,
		calc((100vw - var(--phone-width)) / (var(--desktop-width) - var(--phone-width))),
		1
		);

		--bias: calc(1.7 - (1.1 * var(--t)));

		/* COLORS */
		--bg: rgb(248, 236, 229);
		--bg-soft: rgb(240, 229, 220);
		--panel: rgb(248, 236, 229);
		--text: rgb(39, 23, 18);
		--text-soft: rgb(66, 49, 41);
		--accent: rgb(109, 31, 33);
		--accent-dark: rgb(86, 22, 23);
		--line: rgb(221, 211, 194);

		/* FONTS */
		--serif: Georgia, "Times New Roman", serif;
		--sans: Arial, Helvetica, sans-serif;
	}

	* {
		box-sizing: border-box;
	}

	html, body {
		margin: 0;
		padding: 0;
		background: var(--panel);
		color: var(--text);
		font-family: var(--sans);
	}

	a {
		text-decoration: none;
		color: inherit;
	}

	/* PAGE WRAPPER */
	.page {
		width: min(100vw, 1200px);
		margin: 0 auto;
		position: relative;
		min-height: 100vh;
		background: var(--panel);
	}

	/* TOP BAR (OVERLAY) */
	.topbar {
		position: absolute;
		top: 0;
		left: 0;
		width: 100%;
		height: 0;
		z-index: 10;
		pointer-events: none;
	}

	.nav {
		position: absolute;
		top: calc(min(32px, calc(32 / var(--design-width) * 100vw)) * var(--bias));
		left: min(64px, calc(64 / var(--design-width) * 100vw));
		display: flex;
		gap: min(54px, calc(54 / var(--design-width) * 100vw));
		font-size: calc(min(23px, calc(23 / var(--design-width) * 100vw)) * var(--bias));
		font-weight: 600;
		color: var(--text);
		pointer-events: auto;
	}

	.nav a {
		position: relative;
		padding-bottom: calc(min(6px, calc(6 / var(--design-width) * 100vw)) * var(--bias));
		transition: color 0.2s ease;
	}

	.nav a:hover {
		color: var(--accent);
	}

	.nav a.current-page {
		color: var(--accent);
	}

	.nav a.current-page::after {
		content: "";
		position: absolute;
		left: 0;
		bottom: 0;
		width: 100%;
		height: calc(min(3px, calc(3 / var(--design-width) * 100vw)) * var(--bias));
		background: var(--accent);
		border-radius: 999px;
	}

	/* PLACEHOLDER CONTENT AREA */
	.content {
		padding-top: 120px;
		padding-left: min(64px, calc(64 / var(--design-width) * 100vw));
		padding-right: min(64px, calc(64 / var(--design-width) * 100vw));
	}

	.placeholder {
		height: 400px;
		background: var(--bg-soft);
		border-radius: 20px;
		display: flex;
		align-items: center;
		justify-content: center;
		font-size: 24px;
		color: var(--text-soft);
	}
	</style>
</head>

<body>
	<main class="page">

		<header class="topbar">
			<nav class="nav">
				<a href="/" class="current-page">Home</a>
				<a href="/Available-Kittens">Available Kittens</a>
				<a href="/Queens">Queens</a>
				<a href="/Kings">Kings</a>
				<a href="/News">News</a>
			</nav>
		</header>

		<section class="content">
			<div class="placeholder">
				Page Content Goes Here
			</div>
		</section>

	</main>
</body>
</html>
