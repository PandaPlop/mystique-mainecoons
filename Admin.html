<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Base Layout</title>

	<style>
		:root {
			--design-width: 1200;
			--phone-width: 375px;
			--desktop-width: 1200px;

			--t: clamp(
				0,
				calc((100vw - var(--phone-width)) / (var(--desktop-width) - var(--phone-width))),
				1
			);

			--bias: calc(1.7 - (1.1 * var(--t)));
			--textbias: calc(1.1 - (0.4 * var(--t)));
			--imagebias: calc(1.2 - (0.3 * var(--t)));

			--bg: rgb(248, 236, 229);
			--bg-soft: rgb(240, 229, 220);
			--panel: rgb(248, 236, 229);
			--text: rgb(39, 23, 18);
			--text-soft: rgb(66, 49, 41);
			--accent: rgb(109, 31, 33);
			--accent-dark: rgb(86, 22, 23);
			--line: rgb(221, 211, 194);

			--shadow: 0 min(10px, calc(10 / var(--design-width) * 100vw))
				min(30px, calc(30 / var(--design-width) * 100vw))
				rgba(36, 23, 18, 0.08);

			--serif: Georgia, "Times New Roman", serif;
			--sans: Arial, Helvetica, sans-serif;
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			padding: 0;
			background: var(--panel);
			overflow-x: hidden;
			font-family: var(--sans);
			color: var(--text);
		}

		body {
			min-height: 100vh;
		}

		a {
			text-decoration: none;
			color: inherit;
		}

		img {
			display: block;
			max-width: 100%;
		}

		.viewport {
			width: 100%;
			min-height: 100vh;
			background: var(--panel);
		}

		.page {
			width: min(100vw, 1200px);
			margin: 0 auto;
			background: var(--panel);
			box-shadow: var(--shadow);
			overflow: hidden;
			position: relative;
			min-height: 100vh;
		}

		/* TOP NAV OVER IMAGE */
		.topbar {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 0;
			z-index: 10;
			pointer-events: none;
		}

		.nav {
			position: absolute;
			top: calc(min(32px, calc(32 / var(--design-width) * 100vw)) * var(--bias));
			left: min(64px, calc(64 / var(--design-width) * 100vw));
			display: flex;
			gap: min(54px, calc(54 / var(--design-width) * 100vw));
			font-size: calc(min(23px, calc(23 / var(--design-width) * 100vw)) * var(--bias));
			font-weight: 600;
			color: rgb(35, 24, 19);
			pointer-events: auto;
		}

		.nav a {
			position: relative;
			padding-bottom: calc(min(6px, calc(6 / var(--design-width) * 100vw)) * var(--bias));
			transition: color 0.2s ease;
		}

		.nav a:hover {
			color: var(--accent);
		}

		.nav a.current-page {
			color: var(--accent);
		}

		.nav a.current-page::after {
			content: "";
			position: absolute;
			left: 0;
			bottom: 0;
			width: 100%;
			height: calc(min(3px, calc(3 / var(--design-width) * 100vw)) * var(--bias));
			background: var(--accent);
			border-radius: 999px;
		}

		/* HEADER IMAGE (REUSABLE HERO) */
		.header-image {
			position: relative;
			height: calc(min(500px, calc(500 / var(--design-width) * 100vw)) * var(--imagebias));
			overflow: hidden;
			background: var(--panel);
		}

		.header-image::after {
			content: "";
			position: absolute;
			inset: 0;
			z-index: 2;
			pointer-events: none;

			--left-fade: calc(55% * var(--imagebias));
			--top-fade: calc(12% * var(--imagebias));

			background:
				linear-gradient(to right, var(--bg) 0%, rgba(248,236,229,0) var(--left-fade)),
				linear-gradient(to bottom, var(--bg) 0%, rgba(248,236,229,0) var(--top-fade));
		}

		.header-image img {
			position: absolute;
			top: 0;
			right: 0;
			height: 100%;
			width: auto;
			max-width: none;
		}

		/* GENERIC CONTENT */
		.section {
			padding:
				calc(min(80px, calc(80 / var(--design-width) * 100vw)) * var(--bias))
				min(80px, calc(80 / var(--design-width) * 100vw));
		}

		.section-title {
			margin: 0 0 calc(min(20px, calc(20 / var(--design-width) * 100vw)) * var(--textbias));
			font-family: var(--serif);
			font-size: calc(min(60px, calc(60 / var(--design-width) * 100vw)) * var(--textbias));
			font-weight: 700;
		}

		.section-copy {
			margin: 0;
			font-size: calc(min(26px, calc(26 / var(--design-width) * 100vw)) * var(--textbias));
			line-height: 1.5;
			font-weight: 600;
			color: var(--text-soft);
		}
	</style>
</head>

<body>
	<div class="viewport">
		<main class="page">

			<header class="topbar">
				<nav class="nav">
					<a href="/" class="current-page">Home</a>
					<a href="/Available-Kittens">Available Kittens</a>
					<a href="/Queens">Queens</a>
					<a href="/Kings">Kings</a>
					<a href="/News">News</a>
				</nav>
			</header>

			<section class="header-image">
				<img src="https://placehold.co/1600x900/e2d7c2/3a291d?text=Header+Image" />
			</section>

			<section class="section">
				<h1 class="section-title">Page Title</h1>
				<p class="section-copy">
					Base layout content goes here.
				</p>
			</section>

		</main>
	</div>
</body>
</html>
