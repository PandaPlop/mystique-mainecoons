<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Mystique Mainecoons</title>

		<style>
			:root {
			--design-width: 1200;
			--phone-width: 375px;
			--desktop-width: 1200px;

			--t: clamp(
			0,
			calc((100vw - var(--phone-width)) / (var(--desktop-width) - var(--phone-width))),
			1
			);

			--bias: calc(1.7 - (1.1 * var(--t)));
			--textbias: calc(1.1 - (0.4 * var(--t)));
			--imagebias: calc(1.2 - (0.3 * var(--t)));

			--bg: #f5f1e7;
			--bg-soft: #efe8d9;
			--panel: #f7f3ea;
			--text: #241712;
			--accent: #8c1d2c;
			--accent-dark: #741825;
			--shadow: 0 min(10px, calc(10 / var(--design-width) * 100vw)) min(30px, calc(30 / var(--design-width) * 100vw)) rgba(36, 23, 18, 0.08);
			--serif: Georgia, "Times New Roman", serif;
			--sans: Arial, Helvetica, sans-serif;
			}

			* { box-sizing: border-box; }

			html, body {
			margin: 0;
			padding: 0;
			background: var(--panel);
			overflow-x: hidden;
			font-family: var(--sans);
			color: var(--text);
			}

			.viewport {
			width: 100%;
			min-height: 100vh;
			background: var(--panel);
			}

			.page {
			width: min(100vw, 1200px);
			margin: 0 auto;
			background: var(--panel);
			box-shadow: var(--shadow);
			overflow: hidden;
			position: relative;
			}

			/* NAV NOW OVER HERO */
			.nav {
			position: absolute;
			top: calc(min(28px, calc(28 / var(--design-width) * 100vw)) * var(--bias));
			left: min(64px, calc(64 / var(--design-width) * 100vw));
			z-index: 5;

			display: flex;
			gap: min(54px, calc(54 / var(--design-width) * 100vw));

			font-size: calc(min(23px, calc(23 / var(--design-width) * 100vw)) * var(--bias));
			font-weight: 600;
			color: white; /* important for contrast over image */
			}

			.hero {
			position: relative;
			height: calc(min(690px, calc(690 / var(--design-width) * 100vw)) * var(--imagebias));
			background: var(--panel);
			overflow: visible;
			}

			.hero::after {
			content: "";
			position: absolute;
			inset: 0;
			z-index: 2;
			pointer-events: none;

			--left-fade: calc(55% * var(--imagebias));
			--top-fade: calc(12% * var(--imagebias));

			background:
			linear-gradient(to right, var(--bg) 0%, rgba(245,241,231,0) var(--left-fade)),
			linear-gradient(to bottom, var(--bg) 0%, rgba(245,241,231,0) var(--top-fade));
			}

			.hero-image-wrap {
			position: absolute;
			inset: 0;
			z-index: 1;
			}

			.hero-image-wrap img {
			position: absolute;
			top: 0;
			right: 0;
			height: 100%;
			width: auto;
			max-width: none;
			}

			.hero-content {
			position: relative;
			z-index: 3;
			width: min(540px, calc(540 / var(--design-width) * 100vw));
			padding:
			calc(min(120px, calc(120 / var(--design-width) * 100vw)) * var(--imagebias))
			0
			0
			min(80px, calc(80 / var(--design-width) * 100vw));
			}

			.hero-title {
			margin: 0;
			font-family: var(--serif);
			font-size: calc(min(90px, calc(90 / var(--design-width) * 100vw)) * var(--imagebias));
			line-height: 1.05;
			font-weight: 700;
			color: #251813;
			}

			.hero-quote {
			margin-top: calc(min(26px, calc(26 / var(--design-width) * 100vw)) * var(--imagebias));
			font-size: calc(min(28px, calc(28 / var(--design-width) * 100vw)) * var(--imagebias));
			font-weight: 700;
			}

			.hero-button {
			margin-top: calc(min(54px, calc(54 / var(--design-width) * 100vw)) * var(--bias));
			display: inline-flex;
			align-items: center;
			justify-content: center;
			height: calc(min(72px, calc(72 / var(--design-width) * 100vw)) * var(--bias));
			padding: 0 min(42px, calc(42 / var(--design-width) * 100vw));
			border-radius: 999px;
			background: var(--accent);
			color: white;
			font-size: calc(min(28px, calc(28 / var(--design-width) * 100vw)) * var(--bias));
			font-weight: 700;
			}

			.tica-badge {
			position: absolute;
			right: min(45px, calc(45 / var(--design-width) * 100vw));
			bottom: calc(min(-20px, calc(-20 / var(--design-width) * 100vw)) * var(--imagebias));
			width: calc(min(170px, calc(170 / var(--design-width) * 100vw)));
			z-index: 3;
			opacity: 0.75;
			}

			.about {
			background: var(--bg-soft);
			padding:
			calc(min(42px, calc(42 / var(--design-width) * 100vw)) * var(--bias))
			min(80px, calc(80 / var(--design-width) * 100vw));
			}

			.bottom-image {
			height: calc(min(360px, calc(360 / var(--design-width) * 100vw)) * var(--bias));
			overflow: hidden;
			}

			.bottom-image img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			}
		</style>
	</head>

	<body>
		<div class="viewport">
			<main class="page">

				<section class="hero">

					<!-- NAV OVER IMAGE -->
					<nav class="nav">
						<a href="#">Home</a>
						<a href="#">Available Kittens</a>
						<a href="#">Queens</a>
						<a href="#">Kings</a>
						<a href="#">Past Litters</a>
					</nav>

					<div class="hero-image-wrap">
						<img src="/uploads/untitled316-20260411235806.png" />
					</div>

					<div class="hero-content">
						<h1 class="hero-title">
							Mystique<br />Mainecoons
						</h1>

						<p class="hero-quote">
							"A goal without a plan is just a dream."
						</p>

						<a href="#" class="hero-button">
							Available kittens
						</a>
					</div>

					<div class="tica-badge">
						<img src="/uploads/untitled316-20260412000356.png" />
					</div>

				</section>

				<section class="about">
					<h2>About Us</h2>
				</section>

				<section class="bottom-image">
					<img src="https://placehold.co/1600x900/e2d7c2/3a291d" />
				</section>

			</main>
		</div>
	</body>
</html>
