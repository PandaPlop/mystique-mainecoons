<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Mystique Mainecoons</title>

		<style>
			:root {
			--design-width: 1200;
			--phone-width: 375px;
			--desktop-width: 1200px;

			--t: clamp(
			0,
			calc((100vw - var(--phone-width)) / (var(--desktop-width) - var(--phone-width))),
			1
			);

			--bias: calc(1.7 - (1.1 * var(--t)));
			--textbias: calc(1.1 - (0.4 * var(--t)));
			--imagebias: calc(1.2 - (0.3 * var(--t)));

			--bg: #f5f1e7;
			--bg-soft: #efe8d9;
			--panel: #f7f3ea;
			--text: #241712;
			--text-soft: #3f3129;
			--accent: #8c1d2c;
			--accent-dark: #741825;
			--line: #ddd3c2;
			--shadow: 0 min(10px, calc(10 / var(--design-width) * 100vw)) min(30px, calc(30 / var(--design-width) * 100vw)) rgba(36, 23, 18, 0.08);
			--serif: Georgia, "Times New Roman", serif;
			--sans: Arial, Helvetica, sans-serif;
			}

			* {
			box-sizing: border-box;
			}

			html,
			body {
			margin: 0;
			padding: 0;
			background: #eae4d7;
			overflow-x: hidden;
			font-family: var(--sans);
			color: var(--text);
			}

			body {
			min-height: 100vh;
			}

			a {
			text-decoration: none;
			color: inherit;
			}

			img {
			display: block;
			max-width: 100%;
			}

			.viewport {
			width: 100%;
			min-height: 100vh;
			background: #eae4d7;
			}

			.page {
			width: min(100vw, 1200px);
			margin: 0 auto;
			background: var(--panel);
			box-shadow: var(--shadow);
			overflow: hidden;
			position: relative;
			}

			.topbar {
			height: calc(min(60px, calc(60 / var(--design-width) * 100vw)) * var(--bias));
			background: var(--panel);
			border-bottom: 1px solid rgba(0, 0, 0, 0.05);
			display: flex;
			align-items: center;
			padding: 0 min(64px, calc(64 / var(--design-width) * 100vw));
			}

			.nav {
			display: flex;
			align-items: center;
			gap: min(54px, calc(54 / var(--design-width) * 100vw));
			font-size: calc(min(23px, calc(23 / var(--design-width) * 100vw)) * var(--bias));
			font-weight: 600;
			color: #231813;
			white-space: nowrap;
			}

			.hero {
			position: relative;
			height: calc(min(690px, calc(690 / var(--design-width) * 100vw)) * var(--imagebias));
			background: #f3eee2;
			overflow: visible;
			border-bottom: 1px solid rgba(0, 0, 0, 0.04);
			}

			/* FADE OVERLAY */
			.hero::after {
				content: "";
				position: absolute;
				inset: 0;
				z-index: 2;
				pointer-events: none;
				background:
					linear-gradient(to left, rgba(245,241,231,0) 40%, var(--bg) 100%),
					linear-gradient(to bottom, rgba(245,241,231,0) 40%, var(--bg) 100%);
			}

			.hero-image-wrap {
			position: absolute;
			inset: 0;
			z-index: 1;
			}

			.hero-image-wrap img {
			position: absolute;
			top: 0;
			right: 0;
			height: 100%;
			width: auto;
			max-width: none;
			}

			.hero-content {
			position: relative;
			z-index: 3;
			width: min(540px, calc(540 / var(--design-width) * 100vw));
			padding:
			calc(min(88px, calc(88 / var(--design-width) * 100vw)) * var(--imagebias))
			0
			0
			min(80px, calc(80 / var(--design-width) * 100vw));
			}

			.hero-title {
			margin: 0;
			font-family: var(--serif);
			font-size: calc(min(90px, calc(90 / var(--design-width) * 100vw)) * var(--imagebias));
			line-height: 1.05;
			font-weight: 700;
			color: #251813;
			}

			.hero-quote {
			margin: calc(min(26px, calc(26 / var(--design-width) * 100vw)) * var(--imagebias)) 0 0;
			font-size: calc(min(28px, calc(28 / var(--design-width) * 100vw)) * var(--imagebias));
			line-height: 1.28;
			font-weight: 700;
			color: #2f211a;
			max-width: min(400px, calc(400 / var(--design-width) * 100vw));
			}

			.hero-button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			margin-top: calc(min(54px, calc(54 / var(--design-width) * 100vw)) * var(--bias));
			height: calc(min(72px, calc(72 / var(--design-width) * 100vw)) * var(--bias));
			padding: 0 min(42px, calc(42 / var(--design-width) * 100vw));
			border-radius: 999px;
			background: var(--accent);
			color: white;
			font-size: calc(min(28px, calc(28 / var(--design-width) * 100vw)) * var(--bias));
			font-weight: 700;
			box-shadow: 0 min(12px, calc(12 / var(--design-width) * 100vw)) min(22px, calc(22 / var(--design-width) * 100vw)) rgba(109, 33, 33, 0.2);
			}

			.hero-button:hover {
			background: var(--accent-dark);
			}

			.tica-badge {
			position: absolute;
			right: min(45px, calc(45 / var(--design-width) * 100vw));
			bottom: calc(min(-20px, calc(-20 / var(--design-width) * 100vw)) * var(--imagebias));
			width: calc(min(170px, calc(170 / var(--design-width) * 100vw)) * 1);
			opacity: 0.74;
			z-index: 4;
			}

			.tica-badge img {
			width: 100%;
			height: auto;
			display: block;
			}
		</style>
	</head>

	<body>
		<div class="viewport">
			<main class="page">
				<section class="hero">
					<div class="hero-image-wrap">
						<img src="/uploads/untitled316-20260411235806.png" />
					</div>

					<div class="hero-content">
						<h1 class="hero-title">Mystique<br />Mainecoons</h1>
						<p class="hero-quote">"A goal without a plan is just a dream."</p>
						<a href="#" class="hero-button">Available kittens</a>
					</div>

					<div class="tica-badge">
						<img src="/uploads/untitled316-20260412000356.png" />
					</div>
				</section>
			</main>
		</div>
	</body>
</html>
