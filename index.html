<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mystique Mainecoons</title>

<style>
:root {
--design-width: 1200;
--phone-width: 375px;
--desktop-width: 1200px;

--t: clamp(
0,
calc((100vw - var(--phone-width)) / (var(--desktop-width) - var(--phone-width))),
1
);

--bias: calc(1.7 - (1.1 * var(--t)));
--textbias: calc(1.2 - (0.3 * var(--t)));
--imagebias: calc(1.15 - (0.55 * var(--t)));

--bg: #f5f1e7;
--bg-soft: #efe8d9;
--panel: #f7f3ea;
--text: #241712;
--accent: #8c1d2c;
--accent-dark: #741825;
--shadow: 0 10px 30px rgba(36,23,18,0.08);
--serif: Georgia, serif;
--sans: Arial, sans-serif;
}

* { box-sizing: border-box; }

body {
margin: 0;
background: #eae4d7;
font-family: var(--sans);
}

.page {
max-width: 1200px;
margin: auto;
background: var(--panel);
box-shadow: var(--shadow);
}

.hero {
position: relative;
height: 500px;
overflow: hidden;
}

.hero-img {
position: absolute;
inset: 0;
z-index: 1;
}

.hero-img img {
width: 100%;
height: 100%;
object-fit: cover;
}

.hero-content {
position: relative;
z-index: 2;
padding: 60px;
color: #251813;
}

.about {
padding: 40px;
background: var(--bg-soft);
display: grid;
grid-template-columns: 1fr 1fr;
gap: 40px;
}

.about-img img {
width: 100%;
height: 100%;
object-fit: cover;
}

.bottom {
height: 300px;
overflow: hidden;
}

.bottom img {
width: 100%;
height: 100%;
object-fit: cover;
}
</style>
</head>

<body>

<main class="page">

<section class="hero">

<!-- IMAGE (editable safely) -->
<div class="hero-img"
data-editable="source"
data-path="/index.html"
data-key="hero-img">
<img src="https://placehold.co/1600x1000" />
</div>

<div class="hero-content">
<h1 data-editable="source" data-path="/index.html" data-key="hero-title">
Mystique Mainecoons
</h1>

<p data-editable="source" data-path="/index.html" data-key="hero-quote">
"A goal without a plan is just a dream."
</p>
</div>

</section>

<section class="about">

<div>
<h2 data-editable="source" data-path="/index.html" data-key="about-title">
About Us
</h2>

<p data-editable="source" data-path="/index.html" data-key="about-text">
We didn’t plan on starting a cattery. We fell in love with Maine Coons.
</p>
</div>

<!-- IMAGE (editable safely) -->
<div class="about-img"
data-editable="source"
data-path="/index.html"
data-key="about-img">
<img src="https://placehold.co/900x1200" />
</div>

</section>

<!-- IMAGE (editable safely) -->
<section class="bottom"
data-editable="source"
data-path="/index.html"
data-key="bottom-img">
<img src="https://placehold.co/1600x900" />
</section>

</main>

</body>
</html>
