<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Mystique Mainecoons</title>

		<style>
			:root {
			--design-width: 1200;
			--phone-width: 375px;
			--desktop-width: 1200px;

			--t: clamp(
			0,
			calc((100vw - var(--phone-width)) / (var(--desktop-width) - var(--phone-width))),
			1
			);

			--bias: calc(1.7 - (1.1 * var(--t)));
			--textbias: calc(1.1 - (0.4 * var(--t)));
			--imagebias: calc(1.2 - (0.3 * var(--t)));

			--bg: rgb(248, 236, 229);
			--bg-soft: rgb(240, 229, 220);
			--panel: rgb(248, 236, 229);
			--text: rgb(39, 23, 18);
			--text-soft: rgb(66, 49, 41);
			--accent: rgb(109, 31, 33);
			--accent-dark: rgb(86, 22, 23);
			--line: rgb(221, 211, 194);
			--shadow: 0 min(10px, calc(10 / var(--design-width) * 100vw)) min(30px, calc(30 / var(--design-width) * 100vw)) rgba(36, 23, 18, 0.08);
			--serif: Georgia, "Times New Roman", serif;
			--sans: Arial, Helvetica, sans-serif;
			}

			* {
			box-sizing: border-box;
			}

			html,
			body {
			margin: 0;
			padding: 0;
			background: var(--panel);
			overflow-x: hidden;
			font-family: var(--sans);
			color: var(--text);
			}

			body {
			min-height: 100vh;
			}

			a {
			text-decoration: none;
			color: inherit;
			}

			img {
			display: block;
			max-width: 100%;
			}

			.viewport {
			width: 100%;
			min-height: 100vh;
			background: var(--panel);
			}

			.page {
			width: min(100vw, 1200px);
			margin: 0 auto;
			background: var(--panel);
			box-shadow: var(--shadow);
			overflow: hidden;
			position: relative;
			}

			.topbar {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 0;
			padding: 0;
			margin: 0;
			background: transparent;
			z-index: 5;
			pointer-events: none;
			}

			.nav {
			position: absolute;
			top: calc(min(32px, calc(32 / var(--design-width) * 100vw)) * var(--bias));
			left: min(64px, calc(64 / var(--design-width) * 100vw));
			display: flex;
			align-items: center;
			gap: min(54px, calc(54 / var(--design-width) * 100vw));
			font-size: calc(min(23px, calc(23 / var(--design-width) * 100vw)) * var(--bias));
			font-weight: 600;
			color: #231813;
			white-space: nowrap;
			pointer-events: auto;
			}

			.nav a {
			position: relative;
			display: inline-block;
			padding-bottom: calc(min(6px, calc(6 / var(--design-width) * 100vw)) * var(--bias));
			transition: color 0.2s ease;
			}

			.nav a:hover {
			color: var(--accent);
			}

			.nav a.current-page {
			color: var(--accent);
			}

			.nav a.current-page::after {
			content: "";
			position: absolute;
			left: 0;
			bottom: 0;
			width: 100%;
			height: calc(min(3px, calc(3 / var(--design-width) * 100vw)) * var(--bias));
			background: var(--accent);
			border-radius: 999px;
			}

			.admin-hidden {
			opacity: 0;
			cursor: pointer;
			}

			.hero {
			position: relative;
			height: calc(min(690px, calc(690 / var(--design-width) * 100vw)) * var(--imagebias));
			background: var(--panel);
			overflow: visible;
			}

			.hero::after {
			content: "";
			position: absolute;
			inset: 0;
			z-index: 2;
			pointer-events: none;

			--left-fade: calc(55% * var(--imagebias));
			--top-fade: calc(12% * var(--imagebias));

			background:
			linear-gradient(
				to right,
				var(--bg) 0%,
				rgba(248,236,229,0) var(--left-fade)
			),
			linear-gradient(
				to bottom,
				var(--bg) 0%,
				rgba(248,236,229,0) var(--top-fade)
			);
			}

			.hero-image-wrap {
			position: absolute;
			inset: 0;
			z-index: 1;
			}

			.hero-image-wrap img {
			position: absolute;
			top: 0;
			right: 0;
			height: 100%;
			width: auto;
			max-width: none;
			}

			.hero-content {
			position: relative;
			z-index: 3;
			width: min(540px, calc(540 / var(--design-width) * 100vw));
			padding:
			calc(min(88px, calc(88 / var(--design-width) * 100vw)) * var(--imagebias))
			0
			0
			min(80px, calc(80 / var(--design-width) * 100vw));
			}

			.hero-title {
			margin: 0;
			font-family: var(--serif);
			font-size: calc(min(90px, calc(90 / var(--design-width) * 100vw)) * var(--imagebias));
			line-height: 1.05;
			letter-spacing: 0em;
			font-weight: 700;
			color: #251813;
			}

			.hero-quote {
			margin: calc(min(26px, calc(26 / var(--design-width) * 100vw)) * var(--imagebias)) 0 0;
			font-size: calc(min(28px, calc(28 / var(--design-width) * 100vw)) * var(--imagebias));
			line-height: 1.28;
			font-weight: 700;
			color: #2f211a;
			max-width: min(400px, calc(400 / var(--design-width) * 100vw));
			}

			.hero-button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			margin-top: calc(min(54px, calc(54 / var(--design-width) * 100vw)) * var(--bias));
			height: calc(min(72px, calc(72 / var(--design-width) * 100vw)) * var(--bias));
			padding: 0 min(42px, calc(42 / var(--design-width) * 100vw));
			border-radius: 999px;
			background: var(--accent);
			color: white;
			font-size: calc(min(28px, calc(28 / var(--design-width) * 100vw)) * var(--bias));
			font-weight: 700;
			box-shadow: 0 min(12px, calc(12 / var(--design-width) * 100vw)) min(22px, calc(22 / var(--design-width) * 100vw)) rgba(109, 31, 33, 0.2);
			}

			.hero-button:hover {
			background: var(--accent-dark);
			}

			.tica-badge {
			position: absolute;
			right: min(45px, calc(45 / var(--design-width) * 100vw));
			bottom: calc(min(-20px, calc(-20 / var(--design-width) * 100vw)) * var(--imagebias));
			width: calc(min(170px, calc(170 / var(--design-width) * 100vw)) * 1);
			opacity: 1;
			z-index: 3;
			}

			.tica-badge img {
			width: 100%;
			height: auto;
			display: block;
			}
		</style>
	</head>
	<body>
		<div class="viewport">
			<main class="page" id="page">
				<header class="topbar" data-cloudcannon-ignore>
					<nav class="nav">
						<a href="/" class="current-page" aria-current="page">Home</a>
						<a href="/Available-Kittens">Available Kittens</a>
						<a href="/Queens">Queens</a>
						<a href="/Kings">Kings</a>
						<a href="/News">News</a>
						<a href="/Admin" class="admin-hidden">Admin</a>
					</nav>
				</header>

				<section class="hero">
					<div class="hero-image-wrap">
						<div data-editable="source" data-path="/index.html" data-key="hero-image">
							<p><img src="/uploads/untitled316-20260411235806.png" /></p>
						</div>
					</div>

					<div class="hero-content">
						<h1 class="hero-title" data-editable="source" data-path="/index.html" data-key="hero-title">
							Mystique<br />Mainecoons
						</h1>

						<p class="hero-quote" data-editable="source" data-path="/index.html" data-key="hero-quote">
							"A goal without a plan is just a dream."
						</p>

						<a href="/Available-Kittens" class="hero-button" data-editable="source" data-path="/index.html" data-key="hero-button">
							Available kittens
						</a>
					</div>

					<div class="tica-badge">
						<div data-editable="source" data-path="/index.html" data-key="tica-logo">
							<img src="/uploads/untitled316-20260412000356.png" />
						</div>
					</div>
				</section>
			</main>
		</div>
	</body>
</html>
