<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Mystique Mainecoons</title>

		<style>
			:root {
			--design-width: 1200;
			--phone-width: 375px;
			--desktop-width: 1200px;

			--t: clamp(
			0,
			calc((100vw - var(--phone-width)) / (var(--desktop-width) - var(--phone-width))),
			1
			);

			--bias: calc(1.7 - (1.1 * var(--t)));
			--textbias: calc(1.1 - (0.4 * var(--t)));
			--imagebias: calc(1.2 - (0.3 * var(--t)));

			--bg: rgb(248, 236, 229);
			--bg-soft: rgb(240, 229, 220);
			--panel: rgb(248, 236, 229);
			--text: rgb(39, 23, 18);
			--text-soft: rgb(66, 49, 41);
			--accent: rgb(109, 31, 33);
			--accent-dark: rgb(86, 22, 23);
			--line: rgb(221, 211, 194);
			--shadow: 0 min(10px, calc(10 / var(--design-width) * 100vw)) min(30px, calc(30 / var(--design-width) * 100vw)) rgba(36, 23, 18, 0.08);
			--serif: Georgia, "Times New Roman", serif;
			--sans: Arial, Helvetica, sans-serif;
			}

			* { box-sizing: border-box; }

			html, body {
			margin: 0;
			padding: 0;
			background: var(--panel);
			overflow-x: hidden;
			font-family: var(--sans);
			color: var(--text);
			}

			body { min-height: 100vh; }

			a { text-decoration: none; color: inherit; }

			img { display: block; max-width: 100%; }

			.viewport {
			width: 100%;
			min-height: 100vh;
			background: var(--panel);
			}

			.page {
			width: min(100vw, 1200px);
			margin: 0 auto;
			background: var(--panel);
			box-shadow: var(--shadow);
			overflow: hidden;
			position: relative;
			}

			.topbar {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 0;
			background: transparent;
			z-index: 5;
			pointer-events: none;
			}

			.nav {
			position: absolute;
			top: calc(min(32px, calc(32 / var(--design-width) * 100vw)) * var(--bias));
			left: min(64px, calc(64 / var(--design-width) * 100vw));
			display: flex;
			gap: min(54px, calc(54 / var(--design-width) * 100vw));
			font-size: calc(min(23px, calc(23 / var(--design-width) * 100vw)) * var(--bias));
			font-weight: 600;
			pointer-events: auto;
			}

			.nav a { padding-bottom: 6px; }

			.hero {
			position: relative;
			height: calc(min(690px, calc(690 / var(--design-width) * 100vw)) * var(--imagebias));
			overflow: visible;
			}

			.hero-image-wrap img {
			position: absolute;
			top: 0;
			right: 0;
			height: 100%;
			width: auto;
			}

			.hero-content {
			position: relative;
			z-index: 3;
			padding: 80px;
			}

			.hero-title {
			font-size: calc(min(90px, calc(90 / var(--design-width) * 100vw)) * var(--imagebias));
			font-family: var(--serif);
			margin: 0;
			}

			.hero-button {
			display: inline-block;
			margin-top: 30px;
			padding: 15px 30px;
			background: var(--accent);
			color: white;
			border-radius: 999px;
			}

			.tica-badge {
			position: absolute;
			right: 40px;
			bottom: -20px;
			width: 170px;
			z-index: 3;
			cursor: pointer;
			}

			.tica-badge img {
			width: 100%;
			}

			.about {
			padding: 40px;
			}
		</style>
	</head>

	<body>
		<div class="viewport">
			<main class="page">

				<header class="topbar">
					<nav class="nav">
						<a href="/" class="current-page">Home</a>
						<a href="/Available-Kittens">Available Kittens</a>
						<a href="/Queens">Queens</a>
						<a href="/Kings">Kings</a>
						<a href="/News">News</a>
					</nav>
				</header>

				<section class="hero">
					<div class="hero-image-wrap">
						<img src="/uploads/untitled316-20260411235806.png" />
					</div>

					<div class="hero-content">
						<h1 class="hero-title">Mystique Mainecoons</h1>
						<a href="/Available-Kittens" class="hero-button">Available kittens</a>
					</div>

					<div class="tica-badge">
						<img src="/uploads/untitled316-20260412000356.png" />
					</div>
				</section>

				<section class="about">
					<h2>About Us</h2>
					<p>
						We didn’t plan on starting a cattery. We started as two people who fell completely in love with
						Maine Coons.
					</p>
				</section>

			</main>
		</div>

		<script>
			let ticaClickCount = 0;
			let ticaClickTimer = null;

			const ticaBadge = document.querySelector('.tica-badge');

			ticaBadge.addEventListener('click', () => {
				ticaClickCount++;

				clearTimeout(ticaClickTimer);
				ticaClickTimer = setTimeout(() => {
					ticaClickCount = 0;
				}, 1500);

				if (ticaClickCount >= 5) {
					window.location.href = "/Admin";
				}
			});
		</script>

	</body>
</html>
